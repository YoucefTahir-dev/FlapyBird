name: Flutter Android CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
      - "release/**"

permissions:
  contents: read

jobs:
  android:
    name: Analyze, Test, Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Create temporary CI signing key
        run: |
          keytool -genkeypair -v \
            -keystore android/app/ci-upload-keystore.p12 \
            -storetype PKCS12 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias upload \
            -storepass ci-temporary-password \
            -keypass ci-temporary-password \
            -dname "CN=Flapy Quest CI, OU=CI, O=Flapy Quest, L=Paris, ST=Ile-de-France, C=FR"
          cat > android/key.properties <<'EOF'
          storePassword=ci-temporary-password
          keyPassword=ci-temporary-password
          keyAlias=upload
          storeFile=../app/ci-upload-keystore.p12
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
